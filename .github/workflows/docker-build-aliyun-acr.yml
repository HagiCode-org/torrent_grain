name: Docker Build and Push to Aliyun ACR

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to build, defaults to package.json when omitted
        required: false
        type: string
      platform:
        description: Docker platform selector
        required: false
        type: choice
        default: all
        options:
          - all
          - linux-amd64
          - linux-arm64
  repository_dispatch:
    types:
      - version-monitor-docker-aliyun

permissions:
  contents: read

jobs:
  docker-build-aliyun-acr:
    name: Build and Push to Aliyun ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve release metadata
        id: meta
        env:
          REGISTRY_KIND: aliyun
          IMAGE_NAME: torrent-grain
          INPUT_VERSION: ${{ inputs.version }}
          EVENT_VERSION: ${{ github.event.client_payload.version }}
          INPUT_PLATFORM: ${{ inputs.platform }}
          EVENT_PLATFORM: ${{ github.event.client_payload.platform }}
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
        run: node scripts/docker-release-metadata.mjs >> "$GITHUB_OUTPUT"

      - name: Run Docker smoke test
        env:
          SMOKE_IMAGE_TAG: torrent-grain:smoke-${{ github.run_id }}-${{ github.run_attempt }}
        run: node scripts/docker-smoke-test.mjs "$SMOKE_IMAGE_TAG"

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ steps.meta.outputs.docker_platforms }}
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.docker_tags }}

      - name: Publish summary
        env:
          REGISTRY_LABEL: ${{ steps.meta.outputs.registry_label }}
          IMAGE_REPOSITORY: ${{ steps.meta.outputs.summary_image_repository }}
          VERSION: ${{ steps.meta.outputs.version }}
          PLATFORM: ${{ steps.meta.outputs.platform_label }}
          IS_STABLE: ${{ steps.meta.outputs.is_stable }}
          TAG_LINES: ${{ steps.meta.outputs.summary_tags_markdown }}
        run: |
          {
            echo "## Docker Build Summary"
            echo
            echo "- **Registry**: ${REGISTRY_LABEL}"
            echo "- **Image**: \`${IMAGE_REPOSITORY}\`"
            echo "- **Version**: \`${VERSION}\`"
            echo "- **Platform**: \`${PLATFORM}\`"
            echo "- **Stable Release**: \`${IS_STABLE}\`"
            echo
            echo "### Image Tags"
            printf '%s\n' "${TAG_LINES}"
          } >> "$GITHUB_STEP_SUMMARY"
